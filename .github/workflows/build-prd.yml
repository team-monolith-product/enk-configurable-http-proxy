name: Build Prd

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: write

jobs:
  build:
    uses: team-monolith-product/tmn-gh-actions/.github/workflows/build_v2.yml@main
    with:
      env: prd
      target: main
      dockerTarget: dev
      helmRepository: enk-opencode-hub-helm
      propertyPath: jupyterhub.proxy.chp.image.tag
      updateTargets: |
        {
          "aws": {
            "imageName": "enk-ecr-chp-all-prd",
            "valueFilePath": ["aws-apne2-prd-hackathon.yaml", "aws-apne2-prd-jupyter.yaml"]
          }
        }
    secrets:
      MACHINE_TOKEN: ${{ secrets.MACHINE_TOKEN }}
